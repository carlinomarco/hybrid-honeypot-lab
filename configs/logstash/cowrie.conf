# Logstash Pipeline — Cowrie Honeypot Log Ingestion
# File: /etc/logstash/conf.d/cowrie.conf
#
# Receives JSON logs from Filebeat (Pi + AWS) on port 5044
# Parses them and ships to Elasticsearch

input {
  beats {
    # Listen on all interfaces so AWS can reach us via WireGuard VPN
    host => "0.0.0.0"
    port => 5044
  }
}

filter {
  # Parse the Cowrie JSON log format
  json {
    source => "message"
    skip_on_invalid_json => true
  }

  # Add a human-readable timestamp
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["https://localhost:9200"]

    # Daily index rotation: cowrie-2026.05.17
    index => "cowrie-%{+YYYY.MM.dd}"

    user => "elastic"
    # Replace with your actual Elasticsearch password
    password => "REPLACE_WITH_YOUR_ELASTIC_PASSWORD"

    ssl_certificate_verification => false
  }

  # Optional: also print to stdout for debugging
  # stdout { codec => rubydebug }
}
