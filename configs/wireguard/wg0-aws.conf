# WireGuard Configuration — AWS Cloud Sensor (wg0)
# File: /etc/wireguard/wg0.conf (on AWS EC2)
#
# SECURITY NOTE: Never commit real private keys to GitHub.
# Replace all PLACEHOLDER values with your actual keys.
# Generate keys with: wg genkey | tee privatekey | wg pubkey > publickey

[Interface]
# AWS side of the VPN tunnel
PrivateKey = REPLACE_WITH_AWS_PRIVATE_KEY
Address = 10.100.0.2/24
ListenPort = 51820
MTU = 1420

[Peer]
# pfSense (local lab) side
PublicKey = REPLACE_WITH_PFSENSE_PUBLIC_KEY

# pfSense doesn't have a fixed public IP in this lab (home connection)
# so Endpoint is left empty — pfSense initiates the connection
# Endpoint = YOUR_PFSENSE_PUBLIC_IP:51820

# Routes: VPN subnet + local LAN + DMZ
AllowedIPs = 10.100.0.0/24, 192.168.1.0/24, 172.16.1.0/24

# Keep tunnel alive (sends keepalive every 25 seconds)
PersistentKeepalive = 25
